version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: inventory-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - inventory-net

  # ─────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────
  products-service:
    build:
      context: ./BACKEND/products-service
      dockerfile: Dockerfile
    container_name: products-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/products_db
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      APP_API_KEY: products-secret-key-2024
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - inventory-net

  inventory-service:
    build:
      context: ./BACKEND/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      APP_API_KEY: inventory-secret-key-2024
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - inventory-net

  purchase-service:
    build:
      context: ./BACKEND/purchase-service
      dockerfile: Dockerfile
    container_name: purchase-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/purchases_db
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      APP_API_KEY: purchase-secret-key-2024
      SERVICES_PRODUCTS_URL: http://products-service:8080
      SERVICES_PRODUCTS_API_KEY: products-secret-key-2024
      SERVICES_INVENTORY_URL: http://inventory-service:8080
      SERVICES_INVENTORY_API_KEY: inventory-secret-key-2024
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: rabbit_user
      SPRING_RABBITMQ_PASSWORD: rabbit_pass
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      products-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 150s
    networks:
      - inventory-net

  payment-service:
    build:
      context: ./BACKEND/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments_db
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      APP_API_KEY: payment-secret-key-2024
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: rabbit_user
      RABBITMQ_PASSWORD: rabbit_pass
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - inventory-net

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: inventory-frontend
    environment:
      PRODUCTS_API_KEY: products-secret-key-2024
      INVENTORY_API_KEY: inventory-secret-key-2024
      PURCHASE_API_KEY: purchase-secret-key-2024
      PAYMENT_API_KEY: payment-secret-key-2024
    ports:
      - "5173:80"
    depends_on:
      products-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      purchase-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - inventory-net

volumes:
  postgres_data:

networks:
  inventory-net:
    driver: bridge
