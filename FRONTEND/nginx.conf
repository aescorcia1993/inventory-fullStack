server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver; re-resolve every 30 s
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/v1/products {
        set $upstream http://products-service:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key "${PRODUCTS_API_KEY}";
    }

    location /api/v1/inventory {
        set $upstream http://inventory-service:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key "${INVENTORY_API_KEY}";
    }

    location /api/v1/purchases {
        set $upstream http://purchase-service:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key "${PURCHASE_API_KEY}";
    }

    location /api/v1/payments {
        set $upstream http://payment-service:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key "${PAYMENT_API_KEY}";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
